<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FloppaBank 0</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f0c1b; }
/* Контейнер карты (высота увеличена для баланса) */
.card-widget { position: relative; width: 380px; height: 250px; background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05)); border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(142, 68, 173, 0.2); overflow: hidden; color: #ffffff; display: flex; flex-direction: column; justify-content: space-between; }
/* Свечение на заднем плане карты */
.card-widget::before { content: ''; position: absolute; top: -50%; right: -50%; width: 100%; height: 100%; background: linear-gradient(135deg, #00f2fe, #4facfe); border-radius: 50%; z-index: -1; opacity: 0.15; filter: blur(50px); }
/* Шапка карты */
.card-header { display: flex; justify-content: space-between; align-items: center; }
.bank-name { font-size: 1.3rem; font-weight: 800; letter-spacing: 1px; background: linear-gradient(45deg, #ff9a9e, #fecfef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.card-logo { font-size: 1.5rem; }
/* Блок баланса */
.balance-container { margin-top: 15px; }
.balance-label { font-size: 0.65rem; text-transform: uppercase; color: #a4b0be; letter-spacing: 1px; }
.balance-value { font-size: 1.8rem; font-weight: 700; color: #00f2fe; text-shadow: 0 0 10px rgba(0, 242, 254, 0.4); animation: pulse 3s infinite alternate; }
/* Номер карты */
.card-number { font-size: 1.3rem; letter-spacing: 3px; margin-top: 10px; font-weight: 500; color: #f1f2f6; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
/* Нижняя часть */
.card-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 10px; }
.info-label { font-size: 0.65rem; text-transform: uppercase; color: #a4b0be; letter-spacing: 1px; margin-bottom: 3px; }
.info-value { font-size: 0.9rem; letter-spacing: 1px; font-weight: 500; }
/* Валюта FLP */
.currency-badge { background: rgba(255, 255, 255, 0.1); padding: 4px 10px; border-radius: 30px; font-size: 0.8rem; font-weight: bold; border: 1px solid rgba(255, 255, 255, 0.2); color: #ff9a9e; box-shadow: 0 0 10px rgba(255, 154, 158, 0.2); }
/* Анимация пульсации для баланса */
@keyframes pulse { 0% { text-shadow: 0 0 10px rgba(0, 242, 254, 0.4); } 100% { text-shadow: 0 0 20px rgba(0, 242, 254, 0.8); } }
</style>
</head>
<body>
<div class="card-widget">
<!-- Шапка: Название и Логотип -->
<div class="card-header">
<span class="bank-name">FloppaBank</span>
<span class="card-logo"> FLP</span>
</div>
<!-- Баланс карты -->
<div class="balance-container">
<div class="balance-label">Balance</div>
<!-- Добавлен id="balance" для обновления через JS -->
<div class="balance-value" id="balance"></div>
</div>
<!-- Номер карты -->
<div class="card-number">4412 •••• •••• 2026</div>
<!-- Подвал: Имя, Срок, Валюта -->
<div class="card-footer">
<div>
<div class="info-label">USER</div>
<div class="info-value">DENIS1946</div>
</div>
<div>
<div class="info-label">Expires</div>
<div class="info-value">12/27</div>
</div>
<div>
<div class="currency-badge">NORMAL</div>
</div>
</div>
</div>

<!-- Логика работы с переменной -->
<script>
    // Переменная, хранящая значение баланса
    let cardBalance = 10;

    // Функция для вывода баланса на экран
    function updateBalanceDisplay() {
        document.getElementById('balance').textContent = cardBalance + ' FLP';
    }

    // Запускаем обновление при загрузке страницы
    updateBalanceDisplay();
</script>
</body>
</html>
