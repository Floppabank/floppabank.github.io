<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в Floppabank</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Вход в систему</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Логин:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Войти</button>
            <a href="home.html" class="blue-button">Загрузить с устройства</a>

<style>
.blue-button {
    display: inline-block;
    padding: 12px 24px;
    background-color: #007bff; /* Синий цвет */
    color: white; /* Белый текст */
    text-decoration: none; /* Без подчеркивания */
    border-radius: 5px; /* Скругленные углы */
    font-family: sans-serif;
    font-weight: bold;
    transition: background-color 0.2s;
}

.blue-button:hover {
    background-color: #0056b3; /* Темно-синий при наведении */
}
</style>

        </form>
        <div id="errorMessage" class="error"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Предотвращаем стандартную отправку формы

            // Получаем значения из полей ввода
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Заданные логин и пароль
            const correctUsername = 'Denis1946';
            const correctPassword = 'fg2esk';

            // Проверяем соответствие
            if (username === correctUsername && password === correctPassword) {
                // Перенаправление на другую страницу
                window.location.href = 'home.html';
            } else {
                // Показываем сообщение об ошибке
                document.getElementById('errorMessage').textContent = 'Неверный логин или пароль';
            }
        });
    </script>
</body>
</html>
