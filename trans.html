<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Виджет перевода FLP</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .transfer-widget {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
        }

        .widget-title {
            font-size: 20px;
            color: #1a1a1a;
            margin-bottom: 24px;
            text-align: center;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            color: #333;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .input-group input::placeholder {
            color: #ccc;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 16px;
            background: #4a90e2;
            color: #ffffff;
            text-align: center;
            border: none;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-submit:hover {
            background: #357abd;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="transfer-widget">
        <h2 class="widget-title">Перевод FLP</h2>
        
        <form action="home.html" method="GET">
            <div class="input-group">
                <label for="card-from">Номер карты списания</label>
                <input 
                    type="text" 
                    id="card-from" 
                    placeholder="Номер или ID (например, 1, 42 или 16 знаков)" 
                    inputmode="numeric" 
                    pattern="[0-9\s]{1,19}"
                    title="Введите номер карты (только цифры и пробелы)"
                    required
                >
            </div>

            <div class="input-group">
                <label for="amount">Сумма перевода</label>
                <input 
                    type="number" 
                    id="amount" 
                    placeholder="0.00 FLP" 
                    min="0.01" 
                    step="any"
                    required
                >
            </div>

            <div class="input-group">
                <label for="card-to">Номер карты получения</label>
                <input 
                    type="text" 
                    id="card-to" 
                    placeholder="Номер или ID (например, 1, 42 или 16 знаков)" 
                    inputmode="numeric" 
                    pattern="[0-9\s]{1,19}"
                    title="Введите номер карты (только цифры и пробелы)"
                    required
                >
            </div>

            <button type="submit" class="btn-submit">Перевести</button>
        </form>
    </div>

</body>
</html>
